<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

   <div class="d-flex justify-content-between mb-3">

    <a href="/" class="btn btn-secondary">← Back</a>

    <a href="/closed-orders" class="btn btn-dark">
        Closed Orders
    </a>

</div>
    
    

    <div class="card p-4 shadow">

        <h3>Order Details</h3>

        <p><strong>ID:</strong> <span th:text="${order.id}"></span></p>
        <p><strong>Customer Phone:</strong> <span th:text="${order.customerPhone}"></span></p>
        <p><strong>Laptop Model:</strong> <span th:text="${order.laptopModel}"></span></p>

        <hr>

        <h5>Problem</h5>
        <p th:text="${order.problemDescription}"></p>

        <hr>

        <h5>Solution / Fix</h5>

        <form action="/update-solution" method="post">
            <input type="hidden" name="id" th:value="${order.id}">

            <textarea name="solution" class="form-control mb-3"
                      placeholder="Enter fix..."
                      th:text="${order.solution}"></textarea>

            <button class="btn btn-success">Save Fix</button>
        </form>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Closed Orders</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            border-radius: 12px;
        }
        .header {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            color: white;
            padding: 15px;
            border-radius: 10px;
        }
        .table thead {
            background-color: #4e73df;
            color: white;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 8px;
            color: white;
        }
        .Received { background-color: #6c757d; }
        .Repairing { background-color: #ffc107; }
        .Ready { background-color: #0dcaf0; }
        .Delivered { background-color: #198754; }

        .PAID { background-color: #198754; }
        .PARTIAL { background-color: #ffc107; }
        .UNPAID { background-color: #dc3545; }
    </style>
</head>

<body>

<div class="container mt-4">
    
    <div class="text-end mb-2">
    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
    
    <a href="/" class="btn btn-secondary mb-3">← Back to Dashboard</a>
    <!-- HEADER -->
    <div class="header text-center mb-4">
        <h2>💻 Laptop Service Management</h2>
        <p>Track Repairs, Payments & Status</p>
    </div>

    
   
    <!-- TABLE -->
    <div class="card p-3 shadow">
        <h4>Closed Orders</h4>
        
        <form action="/closed-search" method="get" class="mb-3 d-flex">
        <input type="text" name="phone" class="form-control me-2" placeholder="Search by Phone">
        <button class="btn btn-primary">Search</button>
        </form>
        
       <form action="/closed-search-between-dates" method="get" class="mb-3 row">

	    <div class="col-md-4">
	        <input type="date" name="startDate" class="form-control" required>
	    </div>

	    <div class="col-md-4">
	        <input type="date" name="endDate" class="form-control" required>
	    </div>

	    <div class="col-md-4">
	        <button class="btn btn-success w-100">Search</button>
	    </div>

		</form>
		        
<div class="row mb-3 text-center">

    <div class="row mb-3 text-center">

    <div class="col-md-4">
        <div class="card p-3 bg-primary text-white">
            <h5>Total Orders</h5>
            <h3 th:text="${totalOrders}"></h3>
        </div>
    </div>

 </div>

    

    

</div>

        <table class="table table-bordered table-hover mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Phone</th>
                    <th>Model</th>
                    <th>Problem</th>
                    <th>Status</th>
                    <th>Total</th>
                    <th>Paid</th>
                    <th>Date</th>
                    <th>Closed At</th>
                    <th>Manage</th>
                </tr>
            </thead>

            <tbody>
    <tr th:each="o : ${orders}">
    <td th:text="${o.id}"></td>
    <td th:text="${o.customerPhone}"></td>
    <td th:text="${o.laptopModel}"></td>
    <td>
    <a th:href="@{/order-details(id=${o.id})}" 
       class="btn btn-sm btn-info">View</a>
    </td>

    <!-- STATUS -->
    
    <td>
        <span th:text="${o.status}"
              th:class="'status-badge ' + ${o.status}"></span>
    </td>

    <td th:text="${o.totalAmount}"></td>
    <td th:text="${o.paidAmount}"></td>
  
    <td th:text="${#temporals.format(o.orderDate, 'dd-MM-yyyy')}"></td>
    <td th:text="${o.closedAt != null ? #temporals.format(o.closedAt, 'dd-MM-yyyy HH:mm') : '-'}"></td>
    <!-- DELETE -->
   <td>

    <!-- DELETE (ADMIN ONLY) -->
    <span sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/delete(id=${o.id})}" 
           class="btn btn-danger btn-sm">
           Delete
        </a>
    </span>

    <!-- REOPEN BUTTON -->
    <a th:href="@{/reopen-order(id=${o.id})}" 
       class="btn btn-warning btn-sm"
       onclick="return confirm('Reopen this order?')">
       Reopen
    </a>

</td>
</tr>
</tbody>
        </table>

    </div>

</div>

<div class="text-center mt-3">
    <a th:if="${currentPage > 0}" 
       th:href="@{/closed-orders(page=${currentPage - 1})}" 
       class="btn btn-secondary">Prev</a>

    <span class="mx-2"><span th:text="${currentPage != null ? currentPage + 1 : 1}"></span></span>

    <a th:if="${currentPage < totalPages - 1}" 
       th:href="@{/closed-orders(page=${currentPage + 1})}"
       class="btn btn-secondary">Next</a>
</div>


</body>
</html>

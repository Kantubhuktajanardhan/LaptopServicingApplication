<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Revenue Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <a href="/" class="btn btn-secondary">← Back</a>
        <h3>💰 Revenue Dashboard</h3>
    </div>

    <!-- FILTER -->
    <form action="/revenue-between-dates" method="get" class="row mb-3">

        <div class="col-md-4">
            <input type="date" name="startDate" class="form-control" required>
        </div>

        <div class="col-md-4">
            <input type="date" name="endDate" class="form-control" required>
        </div>

        <div class="col-md-4">
            <button class="btn btn-success w-100">Filter</button>
        </div>

    </form>

    <!-- TOTAL REVENUE -->
    <div class="card p-3 bg-success text-white text-center mb-3">
        <h4>Total Revenue</h4>
        <h2 th:text="${totalRevenue}"></h2>
    </div>

    <!-- TABLE -->
    <div class="card p-3 shadow">

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Phone</th>
                    <th>Model</th>
                    <th>Paid Amount</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="p : ${payments}">
    <td th:text="${p.order.id}"></td>
    <td th:text="${p.order.customerPhone}"></td>
    <td th:text="${p.order.laptopModel}"></td>
    <td th:text="${p.amount}"></td>
    <td th:text="${#temporals.format(p.paymentDate, 'dd-MM-yyyy HH:mm')}"></td>
</tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
